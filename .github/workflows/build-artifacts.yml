name: Build Installers

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build PopPrompt for macOS
        run: |
          xcodebuild \
            -project macos/PopPrompt.xcodeproj \
            -scheme PopPrompt \
            -configuration Release \
            -derivedDataPath build/macos \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Install DMG tooling
        run: brew install create-dmg

      - name: Package DMG
        run: |
          rm -rf dist dmg
          mkdir -p dist dmg
          cp -R "build/macos/Build/Products/Release/PopPrompt.app" "dmg/PopPrompt.app"
          create-dmg \
            --overwrite \
            --background "macos/Branding/DmgBackground.png" \
            --window-size 680 420 \
            --icon-size 112 \
            --icon "PopPrompt.app" 160 250 \
            --hide-extension "PopPrompt.app" \
            --app-drop-link 500 250 \
            "dist/PopPrompt.dmg" \
            "dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: PopPrompt-dmg
          path: dist/PopPrompt.dmg

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Windows app
        run: dotnet restore windows/PopPrompt.Windows/PopPrompt.Windows.csproj

      - name: Publish Windows tray app
        run: >
          dotnet publish windows/PopPrompt.Windows/PopPrompt.Windows.csproj
          -c Release
          -r win-x64
          -p:PublishSingleFile=true
          -p:SelfContained=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ${{ github.workspace }}\artifacts\windows-publish

      - name: Build MSI installer
        run: >
          dotnet build windows/PopPrompt.Windows.Setup/PopPrompt.Windows.Setup.wixproj
          -c Release
          -p:SourceDir=${{ github.workspace }}\artifacts\windows-publish

      - name: Flatten MSI output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $msi = Get-ChildItem -Path windows/PopPrompt.Windows.Setup/bin -Filter *.msi -Recurse | Select-Object -First 1
          if (-not $msi) { throw "MSI not found" }
          Copy-Item $msi.FullName dist/PopPrompt.msi -Force

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: PopPrompt-msi
          path: dist/PopPrompt.msi
